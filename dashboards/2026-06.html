  const suffix = unit === 'Millions' ? 'B' : 'M';
  if (scaled >= 1000) return (scaled / 1000).toFixed(1) + 'T' + (suffix === 'B' ? '' : '');
  if (scaled >= 100) return Math.round(scaled) + suffix;
  if (scaled >= 10) return scaled.toFixed(1) + suffix;
  return scaled.toFixed(2) + suffix;
}

// NTD 매출 (Excel 단위) → 한국 원화(억원)
function fmtKRW(v, unit) {
  if (v === null || v === undefined) return '—';
  // Excel값을 NTD full integer로 변환
  let ntd;
  if (unit === 'Millions') ntd = v * 1_000_000;
  else ntd = v * 1_000;  // Thousands
  const krw = ntd * FX;
  // 억원 = krw / 100,000,000
  const eok = krw / 100_000_000;
  if (eok >= 10000) {
    // 1조원 이상 → 조원 표기
    const jo = eok / 10000;
    return comma(Math.round(jo * 10) / 10).replace(/\.0$/, '') + '조원';
  }
  return comma(Math.round(eok)) + '억원';
}

function badge(value, label) {
  if (value === null || value === undefined || isNaN(value)) {
    return `<span class="bdg">${label} —</span>`;
  }
  const cls = value > 0 ? 'pos' : value < 0 ? 'neg' : '';
  const arrow = value > 0 ? '▲' : value < 0 ? '▼' : '·';
  return `<span class="bdg ${cls}">${label} ${arrow}${fmtPct(value, true)}</span>`;
}

// Y축 자동 조정 — 90th percentile 기반 (outlier robust)
function calcYoyAxisMax(co) {
  let allYoy = [];
  for (const yr of Object.keys(co.yoy_lines)) {
    for (const m of Object.keys(co.yoy_lines[yr])) {
      allYoy.push(Math.abs(co.yoy_lines[yr][m]));
    }
  }
  if (allYoy.length === 0) return 0.5;

  // 최근 24개월 우선
  const recentEntries = [];
  const years = Object.keys(co.yoy_lines).map(Number).sort();
  const maxYr = Math.max(...years);
  for (let yrOffset = 0; yrOffset < 3 && recentEntries.length < 24; yrOffset++) {
    const yr = maxYr - yrOffset;
    if (!co.yoy_lines[yr]) continue;
    for (const m of Object.keys(co.yoy_lines[yr])) {
      recentEntries.push(Math.abs(co.yoy_lines[yr][m]));
    }
  }
  const sample = recentEntries.length >= 6 ? recentEntries : allYoy;
  // 90th percentile
  sample.sort((a, b) => a - b);
  const p90idx = Math.min(sample.length - 1, Math.floor(sample.length * 0.9));
  const p90 = sample[p90idx];
  // 최근 12개월 max도 고려 (너무 짤리지 않도록)
  const recent12 = recentEntries.slice(0, 12);
  const recent12Max = recent12.length ? Math.max(...recent12) : 0;
  const base = Math.max(p90, recent12Max * 0.7);
  return Math.max(base * 1.2, 0.3);
}

function renderChart(co) {
  const W = 460, H = 200;
  const mL = 40, mR = 56, mT = 8, mB = 30;
  const innerW = W - mL - mR;
  const innerH = H - mT - mB;

  const barVals = Object.values(co.bar_data || {});
  const maxRev = barVals.length ? Math.max(...barVals) * 1.15 : 1;

  const yoyMax = calcYoyAxisMax(co);

  function xPos(m) { return mL + ((m - 1) + 0.5) * (innerW / 12); }
  function yYoyClamped(v) {
    const clamped = Math.max(-yoyMax, Math.min(yoyMax, v));
    return mT + innerH/2 - (clamped / yoyMax) * (innerH/2);
  }
  function yRev(v) { return mT + innerH - (v / maxRev) * innerH; }

  let svg = `<svg class="csvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // 그리드 라인
  const yoyLevels = [-yoyMax, -yoyMax/2, 0, yoyMax/2, yoyMax];
  for (const v of yoyLevels) {
    const y = mT + innerH/2 - (v / yoyMax) * (innerH/2);
    const isZero = Math.abs(v) < 0.001;
    svg += `<line x1="${mL}" y1="${y}" x2="${W-mR}" y2="${y}" stroke="${isZero ? '#94a3b8' : '#2a3450'}" stroke-width="${isZero ? 1 : 0.5}" stroke-dasharray="${isZero ? '3,3' : 'none'}"/>`;
    svg += `<text x="${mL-4}" y="${y+3}" text-anchor="end" font-size="9" fill="#94a3b8" font-family="ui-monospace,monospace">${(v*100).toFixed(0)}%</text>`;
  }
  // X축
  for (let m=1; m<=12; m++) {
    if (m % 2 === 1 || m === 12) {
      svg += `<text x="${xPos(m)}" y="${H-10}" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="ui-monospace,monospace">${KMONTH[m]}</text>`;
    }
  }

  // 막대
  const barW = innerW / 12 * 0.55;
  for (const [m, v] of Object.entries(co.bar_data || {})) {
    const x = xPos(parseInt(m)) - barW/2;
    const y = yRev(v);
    const h = innerH - (y - mT);
    svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="var(--bar-fill)" stroke="var(--bar-stroke)" stroke-width="0.8" rx="2"/>`;
  }

  // 우측 매출 축 라벨
  if (maxRev > 0) {
    const labels = [maxRev, maxRev/2];
    for (const v of labels) {
      const y = yRev(v);
      svg += `<text x="${W-mR+4}" y="${y+3}" font-size="9" fill="#94a3b8" font-family="ui-monospace,monospace">${fmtRevAxis(v, co.unit)}</text>`;
    }
  }

  // YoY 라인 (연도별) — outlier는 차트 위/아래 끝에서 clamping
  const years = Object.keys(co.yoy_lines).sort();
  let outliers = [];  // {yr, m, v, dir}
  years.forEach((yr, idx) => {
    const data = co.yoy_lines[yr];
    const months = Object.keys(data).map(Number).sort((a,b)=>a-b);
    if (months.length < 2) return;
    const points = months.map(m => `${xPos(m)},${yYoyClamped(data[m])}`).join(' ');
    const color = lineColor(idx, years.length);
    const sw = lineWidth(idx, years.length);
    svg += `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`;
    const ds = dotSize(idx, years.length);
    if (ds > 0) {
      for (const m of months) {
        const v = data[m];
        const isOutlier = Math.abs(v) > yoyMax * 1.05;
        const cy = yYoyClamped(v);
        const fill = isOutlier ? '#fbbf24' : color;
        const r = isOutlier ? ds + 1 : ds;
        svg += `<circle cx="${xPos(m)}" cy="${cy}" r="${r}" fill="${fill}"${isOutlier ? ' stroke="#0b1020" stroke-width="1"' : ''}/>`;
        if (isOutlier && idx >= years.length - 2) {
          outliers.push({yr, m, v});
        }
      }
    }
  });

  svg += `</svg>`;
  // outlier 라벨 (최근 1-2년만)
  if (outliers.length > 0) {
    const lblTexts = outliers.slice(0, 3).map(o =>
      `${KMONTH[o.m]}/${o.yr.slice(2)} ${fmtPct(o.v)}`
    ).join(', ');
    svg += `<!-- outliers: ${lblTexts} -->`;
    return svg + `<div class="outlier">⚠ outlier: ${lblTexts}</div>`;
  }
  return svg;
}

function renderLegend(co) {
  const years = Object.keys(co.yoy_lines).sort();
  let html = `<div class="lg"><span class="li"><span class="bar"></span>${D.target_year} 매출</span>`;
  years.forEach((yr, idx) => {
    const color = lineColor(idx, years.length);
    html += `<span class="li"><span class="dot" style="background:${color}"></span>${yr} YoY</span>`;
  });
  html += `</div>`;
  return html;
}

function renderCard(co) {
  return `<div class="cd" data-tk="${co.ticker}">
    <div class="cd-hd">
      <div class="cd-name">${co.name}<span class="tk">${co.ticker}</span></div>
      <div class="cd-bdg">${badge(co.latest_mom, 'MoM')} ${badge(co.latest_yoy, 'YoY')}</div>
    </div>
    <div class="cd-desc">${co.description}</div>
    <div class="cd-rev">
      <span class="lbl">최근(${co.latest_period || '—'}):</span>
      <strong class="mn">${fmtRev(co.latest_revenue, co.unit)} NTD</strong>
      <span class="krw mn">≈ ${fmtKRW(co.latest_revenue, co.unit)}</span>
    </div>
    ${renderChart(co)}
    ${renderLegend(co)}
    <div class="cu"><span class="k">주요 고객:</span> ${co.customers}</div>
  </div>`;
}

function renderGroup(g, idx) {
  const cards = g.companies.map(renderCard).join('');
  return `<div class="grp" data-g="${idx}">
    <div class="gt"><span class="em">${g.emoji}</span><span>${g.name}</span><span class="cnt">${g.companies.length}개</span></div>
    <div class="gd">${cards}</div>
  </div>`;
}

function renderFilters() {
  const all = `<button class="ft on" data-g="all">전체</button>`;
  const grps = D.groups.map((g, i) => `<button class="ft" data-g="${i}">${g.emoji} ${g.name}</button>`).join('');
  return all + grps;
}

function renderSummary() {
  const flat = [];
  D.groups.forEach((g, gi) => {
    g.companies.forEach(c => {
      flat.push({...c, gname: g.name, gemoji: g.emoji, gi: gi});
    });
  });
  flat.sort((a, b) => {
    const ay = a.latest_yoy === null ? -Infinity : a.latest_yoy;
    const by = b.latest_yoy === null ? -Infinity : b.latest_yoy;
    return by - ay;
  });
  return flat.map(c => {
    const yoyCls = c.latest_yoy > 0 ? 'yp' : c.latest_yoy < 0 ? 'yn' : 'yneut';
    const momCls = c.latest_mom > 0 ? 'yp' : c.latest_mom < 0 ? 'yn' : 'yneut';
    return `<tr data-g="${c.gi}">
      <td>${c.gemoji} ${c.gname}</td>
      <td><strong>${c.name}</strong> <span class="mn" style="color:#94a3b8;font-size:11px">${c.ticker}</span></td>
      <td>${c.latest_period || '—'}</td>
      <td class="num">${fmtRev(c.latest_revenue, c.unit)}</td>
      <td class="num krw">${fmtKRW(c.latest_revenue, c.unit)}</td>
      <td class="num ${momCls}">${fmtPct(c.latest_mom, true)}</td>
      <td class="num ${yoyCls}">${fmtPct(c.latest_yoy, true)}</td>
      <td class="cust">${c.customers}</td>
    </tr>`;
  }).join('');
}

document.getElementById('filters').innerHTML = renderFilters();
document.getElementById('groups').innerHTML = D.groups.map(renderGroup).join('');
document.getElementById('summary').innerHTML = renderSummary();

document.querySelectorAll('.ft').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ft').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const g = btn.dataset.g;
    document.querySelectorAll('.grp').forEach(grp => {
      grp.classList.toggle('hid', g !== 'all' && grp.dataset.g !== g);
    });
    document.querySelectorAll('#summary tr').forEach(tr => {
      tr.style.display = (g === 'all' || tr.dataset.g === g) ? '' : 'none';
    });
  });
});
</script>
</body>
</html>
