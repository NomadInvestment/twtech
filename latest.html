// 콤마 포맷
function comma(n) {
  return n.toLocaleString('en-US');
}

// 연도별 색상 (다크모드): 어두운 회색 → 최신 밝은 파란
function lineColor(idx, total) {
  if (idx === total - 1) return '#60a5fa';   // 최신: 밝은 파란
  if (idx === total - 2) return '#cbd5e1';   // 전년: 밝은 회색
  const grays = ['#475569', '#64748b', '#94a3b8', '#a8b3c4'];
  return grays[Math.min(idx, grays.length - 1)];
}
function lineWidth(idx, total) {
  if (idx === total - 1) return 3;
  if (idx === total - 2) return 2.2;
  if (idx === total - 3) return 1.5;
  return 1.2;
}
function dotSize(idx, total) {
  if (idx === total - 1) return 3.5;
  if (idx === total - 2) return 2;
  return 0;
}

function fmtPct(v, withSign=true) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const p = (v * 100);
  const s = (withSign && p > 0 ? '+' : '') + p.toFixed(1) + '%';
  return s;
}

// 매출 (Excel 단위) → 콤마 포함 정수 + 단위 접미사
function fmtRev(v, unit) {
  if (v === null || v === undefined) return '—';
  // Millions 시트: v는 millions, /1000 → B
  // Thousands 시트: v는 thousands, /1000 → M
  const scaled = Math.round(v / 1000);
  const suffix = unit === 'Millions' ? 'B' : 'M';
  return comma(scaled) + suffix;
}

// Y축 우측 매출 라벨용 — 짧게
function fmtRevAxis(v, unit) {
  if (v === null || v === undefined) return '';
  const scaled = v / 1000;
  const suffix = unit === 'Millions' ? 'B' : 'M';
  if (scaled >= 1000) return (scaled / 1000).toFixed(1) + 'T' + (suffix === 'B' ? '' : '');
  if (scaled >= 100) return Math.round(scaled) + suffix;
  if (scaled >= 10) return scaled.toFixed(1) + suffix;
  return scaled.toFixed(2) + suffix;
}

// NTD 매출 (Excel 단위) → 한국 원화(억원)
function fmtKRW(v, unit) {

function calcYoyAxisMax(co) {
  let allYoy = [];
  for (const yr of Object.keys(co.yoy_lines)) {
    for (const m of Object.keys(co.yoy_lines[yr])) {
      allYoy.push(Math.abs(co.yoy_lines[yr][m]));

  }
  if (allYoy.length === 0) return 0.5;

  // 최근 24개월 우선

  const maxYr = Math.max(...years);

    if (!co.yoy_lines[yr]) continue;
    for (const m of Object.keys(co.yoy_lines[yr])) {

    }
  }
  const sample = recentEntries.length >= 6 ? recentEntries : allYoy;
  // 90th percentile
  sample.sort((a, b) => a - b);

  });
  return flat.map(c => {
    const yoyCls = c.latest_yoy > 0 ? 'yp' : c.latest_yoy < 0 ? 'yn' : 'yneut';
    const momCls = c.latest_mom > 0 ? 'yp' : c.latest_mom < 0 ? 'yn' : 'yneut';
    return `<tr data-g="${c.gi}">
      <td>${c.gemoji} ${c.gname}</td>
      <td><strong>${c.name}</strong> <span class="mn" style="color:#94a3b8;font-size:11px">${c.ticker}</span></td>
      <td>${c.latest_period || '—'}</td>
      <td class="num">${fmtRev(c.latest_revenue, c.unit)}</td>
      <td class="num krw">${fmtKRW(c.latest_revenue, c.unit)}</td>
      <td class="num ${momCls}">${fmtPct(c.latest_mom, true)}</td>
      <td class="num ${yoyCls}">${fmtPct(c.latest_yoy, true)}</td>
      <td class="cust">${c.customers}</td>
    </tr>`;
  }).join('');
}

document.getElementById('filters').innerHTML = renderFilters();
document.getElementById('groups').innerHTML = D.groups.map(renderGroup).join('');
document.getElementById('summary').innerHTML = renderSummary();

document.querySelectorAll('.ft').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ft').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const g = btn.dataset.g;
    document.querySelectorAll('.grp').forEach(grp => {
      grp.classList.toggle('hid', g !== 'all' && grp.dataset.g !== g);
    });
    document.querySelectorAll('#summary tr').forEach(tr => {
      tr.style.display = (g === 'all' || tr.dataset.g === g) ? '' : 'none';
    });
  });
});
</script>
</body>
</html>
